<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Demo</title>
  <style>
    body{font-family:Arial;background:#111827;color:#fff;display:grid;place-items:center;height:100vh;margin:0}
    .box{background:#1f2937;padding:20px;border-radius:12px;text-align:center}
    button{padding:12px 16px;border-radius:8px;border:none;background:#f59e0b;color:#111;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="box">
    <h1>Cookie Demo</h1>
    <p id="count">Cookies: 0</p>
    <button id="btn">Click Cookie</button>
  </div>
  <script>
    let c=0;const count=document.getElementById('count');
    document.getElementById('btn').onclick=()=>{c++;count.textContent=`Cookies: ${c}`};
  </script>
</body>
</html>
